<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reolon.me</title>

  <!-- Police serif élégante -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #0b1d3a; /* bleu marine */
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      color: #f5f5f5;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .dog-photo {
      width: 100%;
      max-width: 320px;
      border-radius: 12px;
      margin: 0 auto 30px;
      display: block;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    a {
      text-decoration: none;
      color: #f5f5f5;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 12px;
      border-radius: 8px;
      transition: all 0.2s ease;
      font-size: 14px;
      letter-spacing: 1px;
    }

    a:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.5);
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.4;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Reolon</h1>
    <p class="subtitle">reolon.me</p>

<img src="images/dog.JPG" alt="Mon chien" class="dog-photo">
    </div>

    <footer>© reolon.me</footer>
  </div>
</body>
</html>
